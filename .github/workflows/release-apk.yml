name: Build and Publish Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build release APK
        working-directory: frontend
        run: flutter build apk --release

      - name: Verify APK output exists
        shell: bash
        run: test -f frontend/build/app/outputs/flutter-apk/app-release.apk

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: APK latest build
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          overwrite_files: true
          files: frontend/build/app/outputs/flutter-apk/app-release.apk