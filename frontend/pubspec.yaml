name: go4
description: "Go4 – Multimodal AI Retail Navigator"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.7.0

  # State management
  flutter_riverpod: ^2.5.1

  # Camera capture
  camera: ^0.11.0+2

  # Voice recording
  record: ^5.1.2

  # GPS / geolocation
  geolocator: ^13.0.1

  # Google Maps
  google_maps_flutter: ^2.9.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Navigation
  go_router: ^14.0.0

  # Utilities
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  http: ^1.2.2
  cached_network_image: ^3.3.1

  # JWT / auth persistence
  shared_preferences: ^2.3.2

  # Open product URLs and Google Maps
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

# Force record_linux to a version compatible with record_platform_interface 1.5.0
dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icons/Icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/Icon.png"
