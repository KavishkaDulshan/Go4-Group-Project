services:
  go4-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: go4-backend
    restart: unless-stopped
    ports:
      # Host 5000 → Container 3000
      # Flutter emulator hits host via 10.0.2.2:5000
      - "5000:3000"
    volumes:
      # Prevent host node_modules from overwriting container's
      - /app/node_modules
      # Persistent upload storage
      - go4_uploads:/app/uploads
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  go4_uploads:
    driver: local
